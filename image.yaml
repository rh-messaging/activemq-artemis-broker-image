schema_version: 1

name: "arkmq-org/arkmq-org-broker"
description: "ArkMQ Broker is a container image for running Apache Artemis messaging broker in containerized environments"
version: "3.0.2"
from: "registry.access.redhat.com/ubi9/openjdk-17@sha256:80b9941405eda2645d2afb1a8ed177166f114730ac8a176229e2b4d4161c9d1a"

labels:
  - name: "io.k8s.display-name"
    value: "ArkMQ Broker"
  - name: "maintainer"
    value: "ArkMQ <info@arkmq.org>"
  - name: "org.opencontainers.image.title"
    value: "ArkMQ Broker Powered by Apache Artemis"
  - name: "org.opencontainers.image.description"
    value: "ArkMQ Broker is a container image for running Apache Artemis messaging broker in containerized environments"
  - name: "org.opencontainers.image.vendor"
    value: "ArkMQ"

envs:
  - name: "AMQ_HOME"
    value: "/opt/amq"
  - name: "AMQ_NAME"
    value: "broker"
  - name: "AMQ_USER"
  - name: "AMQ_PASSWORD"
  - name: "AMQ_ROLE"
    value: "admin"
  - name: "AMQ_CLUSTERED"
    value: "false"
  - name: "AMQ_CLUSTER_USER"
    value: "cluster_user"
  - name: "AMQ_CLUSTER_PASSWORD"
    value: "cluster_password"
  - name: "AMQ_EXTRA_ARGS"
    value: ""
  - name: "AMQ_RESET_CONFIG"
    value: "false"

ports:
  - value: 1883
  - value: 5445
  - value: 5672
  - value: 8161
  - value: 61613
  - value: 61616

packages:
  manager: microdnf
  install:
    - hostname
    - libaio

modules:
  repositories:
    - path: modules

  install:
    - name: jboss.container.user.legacy
    - name: apache.artemis.install
    - name: apache.artemis.chown
run:
  # The user is in the group 0 to have access to the volumes mounted
  # by Kubernetes that are typically owned by UID 0 (root) and GID 0 (root).
  user: "185:0"
  cmd:
    - "/opt/amq/bin/launch.sh"
